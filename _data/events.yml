  heading: Zen & Tonic at Ace
  date: 2026-05-09 09:30:00
  cost: $30
  description: >-
    Find your flow and then find your friends! Join us in Ace Alley (right next
    to Ace Coffee) for a morning designed to balance movement with a little bit
    of indulgence.


    We’ll begin with a 45–60 minute yoga session tailored for all levels.
    Whether you are a seasoned yogi or trying it for the first time, this
    practice will be laid back with a community building experience. (The
    movement will include movement from ground to standing so that ability is
    required.)


    Once we roll up the mats, it’s time for the "Tonic." Stick around to enjoy a
    refreshing cocktail or mocktail while soaking in the alley vibes.


    Event Breakdown (for $30 you receive):


    The Movement: A beginner-friendly, inclusive yoga flow.


    The Tonic: Your choice of a handcrafted cocktail or a zero-proof mocktail.


    Community: After the drinks, we’ll be hanging out for brunch at Ace
    Coffee-bring a friend and join the crew!


    What to Bring: Please bring your own yoga mat if you have one. Need to
    borrow one? Just let us know in advance and we’ll have one ready for you.


    Come for the stretch, stay for the community, and leave with a little more
    zen.
